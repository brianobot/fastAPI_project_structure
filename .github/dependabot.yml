version: 2
updates:
  # Keep Python dependencies patched (surfaces vulnerable pins as PRs).
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10

  # Keep the GitHub Actions themselves up to date.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
